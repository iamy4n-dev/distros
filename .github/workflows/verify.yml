name: Verify

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build gen-registry
        run: go build ./cmd/gen-registry/

      - name: Run tests
        run: go test ./...

      - name: Install dpod-seed
        run: go install github.com/iamy4n-dev/dpod-seed@$(cat .dpod-seed-version)

      - name: Validate distro content
        run: dpod-seed validate repo

      - name: Dry-run registry generation
        run: ./gen-registry distros v0.0.0-dry-run
